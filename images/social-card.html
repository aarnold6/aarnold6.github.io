<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1200px;
    height: 630px;
    background: #f5f0eb;
    font-family: 'Raleway', sans-serif;
    overflow: hidden;
    position: relative;
  }

  /* Hero-style blob background */
  .hero-bg {
    position: absolute;
    inset: 0;
    pointer-events: none;
    overflow: hidden;
  }
  .hero-blob {
    position: absolute;
    border-radius: 50%;
    filter: blur(72px);
  }
  .hero-blob-1 {
    width: 750px; height: 650px;
    top: -120px; left: -180px;
    background: radial-gradient(circle, rgba(184, 228, 240, 0.62) 0%, transparent 70%);
  }
  .hero-blob-2 {
    width: 560px; height: 500px;
    bottom: -100px; right: -130px;
    background: radial-gradient(circle, rgba(107, 175, 198, 0.42) 0%, transparent 70%);
  }
  .hero-blob-3 {
    width: 400px; height: 360px;
    top: 35%; left: 58%;
    background: radial-gradient(circle, rgba(200, 232, 240, 0.32) 0%, transparent 70%);
  }

  /* Content */
  .content {
    position: absolute;
    left: 70px; top: 0; bottom: 0;
    width: 700px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 60px 0;
  }

  .eyebrow {
    font-family: 'Raleway', sans-serif;
    font-size: 22px;
    font-weight: 600;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: #2a7a94;
    margin-bottom: 20px;
  }

  .left-bar {
    position: absolute;
    left: 0; top: 50px; bottom: 50px;
    width: 4px;
    background: #3D8FA8;
    border-radius: 2px;
  }

  .name {
    font-family: 'Lora', serif;
    font-size: 72px;
    font-weight: 700;
    color: #1a3a45;
    line-height: 1.0;
    margin-bottom: 18px;
    letter-spacing: -0.01em;
  }

  .subtitle {
    font-family: 'Raleway', sans-serif;
    font-size: 20px;
    font-weight: 400;
    color: #4A6B78;
    margin-bottom: 32px;
    letter-spacing: 0.04em;
  }

  .divider {
    width: 48px;
    height: 2px;
    background: rgba(61, 143, 168, 0.4);
    margin-bottom: 28px;
  }

  .tagline {
    font-family: 'Lora', serif;
    font-size: 22px;
    font-style: italic;
    color: #2a5566;
    line-height: 1.55;
    margin-bottom: 36px;
    max-width: 560px;
  }

  .location-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: white;
    border: 1px solid rgba(107, 175, 198, 0.4);
    border-radius: 40px;
    padding: 8px 20px;
    font-size: 16px;
    color: #4A6B78;
    margin-bottom: 24px;
    width: fit-content;
  }
  .location-badge svg { width: 16px; height: 16px; color: #3D8FA8; }

  .url {
    font-size: 16px;
    color: #8aabb8;
    letter-spacing: 0.04em;
  }
</style>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Raleway:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

  <div class="hero-bg">
    <div class="hero-blob hero-blob-1"></div>
    <div class="hero-blob hero-blob-2"></div>
    <div class="hero-blob hero-blob-3"></div>
  </div>

  <div class="content">
    <div style="position:relative; padding-left: 24px;">
      <div class="left-bar"></div>
      <div class="eyebrow">Craniosacral Fascial Therapy</div>
      <div class="name">Jacquelynn Arnold</div>
      <div class="subtitle">RN, BSN &nbsp;·&nbsp; Gillespie Approach CFT Practitioner</div>
      <div class="divider"></div>
      <div class="tagline">Gentle, hands-on therapy that unwinds fascial<br>tension — restoring whole-body wellness for<br>infants, children &amp; adults.</div>
      <div class="location-badge">
        <svg viewBox="0 0 24 24" fill="currentColor" style="color:#3D8FA8;">
          <path fill-rule="evenodd" d="M11.54 22.351l.07.04.028.016a.76.76 0 00.723 0l.028-.015.071-.041a16.975 16.975 0 001.144-.742 19.58 19.58 0 002.683-2.282c1.944-2.003 3.5-4.697 3.5-8.327a8 8 0 10-16 0c0 3.63 1.556 6.326 3.5 8.327a19.583 19.583 0 002.682 2.282 16.975 16.975 0 001.145.742zM12 13.5a3.5 3.5 0 100-7 3.5 3.5 0 000 7z" clip-rule="evenodd"/>
        </svg>
        Clarkston, MI
      </div>
      <div class="url">www.jarnoldcft.com</div>
    </div>
  </div>

</body>
</html>
