<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1200px;
    height: 630px;
    background: #f5f0eb;
    font-family: 'Raleway', sans-serif;
    overflow: hidden;
    position: relative;
  }

  /* Hero-style blob background */
  .hero-bg {
    position: absolute;
    inset: 0;
    pointer-events: none;
    overflow: hidden;
  }
  .hero-blob {
    position: absolute;
    border-radius: 50%;
    filter: blur(72px);
  }
  .hero-blob-1 {
    width: 750px; height: 650px;
    top: -120px; left: -180px;
    background: radial-gradient(circle, rgba(184, 228, 240, 0.85) 0%, transparent 70%);
  }
  .hero-blob-2 {
    width: 560px; height: 500px;
    bottom: -100px; right: -130px;
    background: radial-gradient(circle, rgba(107, 175, 198, 0.65) 0%, transparent 70%);
  }
  .hero-blob-3 {
    width: 400px; height: 360px;
    top: 35%; left: 58%;
    background: radial-gradient(circle, rgba(200, 232, 240, 0.52) 0%, transparent 70%);
  }

  /* Content */
  .content {
    position: absolute;
    left: 70px; top: 0; bottom: 0;
    width: 900px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 30px 0;
  }

  .eyebrow {
    font-family: 'Raleway', sans-serif;
    font-size: 24px;
    font-weight: 600;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: #2a7a94;
    margin-bottom: 22px;
  }

  .left-bar {
    position: absolute;
    left: 0; top: 20px; bottom: 20px;
    width: 4px;
    background: #3D8FA8;
    border-radius: 2px;
  }

  .name {
    font-family: 'Lora', serif;
    font-size: 74px;
    font-weight: 700;
    color: #1a3a45;
    line-height: 1.0;
    margin-bottom: 20px;
    letter-spacing: -0.01em;
  }

  .subtitle {
    font-family: 'Raleway', sans-serif;
    font-size: 22px;
    font-weight: 400;
    color: #4A6B78;
    margin-bottom: 32px;
    letter-spacing: 0.04em;
  }

  .divider {
    width: 60px;
    height: 2px;
    background: rgba(61, 143, 168, 0.4);
    margin-bottom: 30px;
  }

  .tagline {
    font-family: 'Lora', serif;
    font-size: 28px;
    font-style: italic;
    color: #2a5566;
    line-height: 1.6;
  }

</style>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Raleway:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

  <div class="hero-bg">
    <div class="hero-blob hero-blob-1"></div>
    <div class="hero-blob hero-blob-2"></div>
    <div class="hero-blob hero-blob-3"></div>
  </div>

  <div class="content">
    <div style="position:relative; padding-left: 24px;">
      <div class="left-bar"></div>
      <div class="eyebrow">Craniosacral Fascial Therapy</div>
      <div class="name">Jacquelynn Arnold</div>
      <div class="subtitle">RN, BSN &nbsp;·&nbsp; Gillespie Approach CFT Practitioner</div>
      <div class="divider"></div>
      <div class="tagline">Gentle, hands-on therapy that unwinds fascial tension — restoring whole-body wellness for infants, children &amp; adults.</div>
    </div>
  </div>

</body>
</html>
